<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMS Platform | Learning Roadmaps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/lms.css" />
</head>
<body class="lms-body">

<!-- ═══════════════════ LMS SIDEBAR ═══════════════════ -->
<div class="lms-layout">
  <aside class="lms-sidebar" id="lmsSidebar">
    <div class="sidebar-header">
      <a href="index.html" class="nav-logo sidebar-logo">
        <span class="logo-bracket">{</span>QA<span class="logo-dot">.</span>Dev<span class="logo-bracket">}</span>
      </a>
      <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>

    <div class="sidebar-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search courses..." id="courseSearch" />
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-nav-section">
        <span class="sidebar-section-label">Overview</span>
        <a href="#" class="sidebar-link active" data-view="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="index.html" class="sidebar-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Portfolio
        </a>
      </div>
      <div class="sidebar-nav-section">
        <span class="sidebar-section-label">Learning Paths</span>
        <div id="sidebarCourseList"><!-- JS populated --></div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="theme-toggle sidebar-theme" id="themeToggleLMS" aria-label="Toggle theme">
        <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span class="toggle-label">Dark Mode</span>
      </button>
    </div>
  </aside>

  <!-- ═══════════════════ LMS MAIN ═══════════════════ -->
  <main class="lms-main" id="lmsMain">
    <!-- Top Bar -->
    <header class="lms-topbar">
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-breadcrumb" id="topbarBreadcrumb">Dashboard</div>
      <div class="topbar-right">
        <span class="topbar-tip">2hrs/day • 4-6 months</span>
        <a href="index.html" class="btn btn-sm btn-ghost">← Portfolio</a>
      </div>
    </header>

    <!-- Dashboard View -->
    <div id="dashboardView" class="lms-view active">
      <div class="dashboard-hero">
        <div class="dash-hero-text">
          <h1>Welcome to Your <span class="accent">Learning Hub</span></h1>
          <p>9 curated roadmaps from beginner to advanced. Commit 2 hours daily and complete any path in 4–6 months.</p>
        </div>
        <div class="dash-stats">
          <div class="dash-stat">
            <span class="dash-stat-num">9</span>
            <span class="dash-stat-label">Courses</span>
          </div>
          <div class="dash-stat">
            <span class="dash-stat-num">4–6</span>
            <span class="dash-stat-label">Months</span>
          </div>
          <div class="dash-stat">
            <span class="dash-stat-num">2hrs</span>
            <span class="dash-stat-label">Daily</span>
          </div>
        </div>
      </div>

      <div class="dashboard-filter">
        <button class="filter-btn active" data-filter="all">All Paths</button>
        <button class="filter-btn" data-filter="java">Java</button>
        <button class="filter-btn" data-filter="python">Python</button>
        <button class="filter-btn" data-filter="testing">Testing</button>
        <button class="filter-btn" data-filter="devops">DevOps</button>
        <button class="filter-btn" data-filter="performance">Performance</button>
      </div>

      <div class="courses-grid" id="dashCoursesGrid">
        <!-- JS populated -->
      </div>
    </div>

    <!-- Course Detail View -->
    <div id="courseView" class="lms-view">
      <div id="courseDetailContent"><!-- JS populated --></div>
    </div>

  </main>
</div>

<script src="js/data.js"></script>
<script src="js/lms.js"></script>
</body>
</html>
